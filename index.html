<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WishCraft – Create & Share Magical Wishes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c842;
    --rose: #e8476a;
    --lavender: #9b72cf;
    --teal: #2ec4b6;
    --cream: #fff8f0;
    --dark: #1a1225;
    --card-bg: rgba(255,255,255,0.07);
    --glass: rgba(255,255,255,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARFIELD ── */
  #stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d, 3s) infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle { 0%{opacity:0;transform:scale(1)} 50%{opacity:var(--o,.7)} 100%{opacity:.1;transform:scale(1.4)} }

  /* ── BACKGROUND ORBS ── */
  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0; animation: drift 18s ease-in-out infinite alternate;
  }
  .orb1 { width:500px;height:500px;background:rgba(155,114,207,.25);top:-100px;left:-100px; }
  .orb2 { width:400px;height:400px;background:rgba(232,71,106,.18);bottom:-80px;right:-80px;animation-delay:-9s; }
  .orb3 { width:300px;height:300px;background:rgba(245,200,66,.15);top:40%;left:50%;animation-delay:-4s; }
  @keyframes drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(40px,60px) scale(1.1)} }

  /* ── LAYOUT ── */
  #app { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    text-align: center; padding: 60px 20px 40px;
    animation: fadeDown .8s ease both;
  }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }

  .logo {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.8rem, 6vw, 5rem);
    background: linear-gradient(135deg, var(--gold), var(--rose), var(--lavender));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 20px rgba(245,200,66,.4));
    line-height: 1;
  }
  .tagline {
    font-size: clamp(.9rem, 2vw, 1.1rem);
    color: rgba(255,255,255,.55);
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    padding: 0 20px 40px;
    animation: fadeUp .8s .2s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .tab-btn {
    padding: 12px 28px; border-radius: 50px; border: 1.5px solid rgba(255,255,255,.15);
    background: var(--glass); color: rgba(255,255,255,.7);
    font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 500;
    cursor: pointer; backdrop-filter: blur(12px);
    transition: all .3s ease; letter-spacing: .5px;
  }
  .tab-btn:hover { border-color: rgba(255,255,255,.4); color: #fff; transform: translateY(-2px); }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--rose), var(--lavender));
    border-color: transparent; color: #fff;
    box-shadow: 0 8px 24px rgba(232,71,106,.35);
  }

  /* ── BUILDER ── */
  .builder {
    max-width: 900px; margin: 0 auto; padding: 0 20px 80px;
    animation: fadeUp .8s .3s ease both;
  }

  .builder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media(max-width:680px){ .builder-grid { grid-template-columns: 1fr; } }

  .glass-card {
    background: var(--glass); border: 1px solid rgba(255,255,255,.12);
    border-radius: 20px; padding: 28px; backdrop-filter: blur(16px);
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; margin-bottom: 18px;
    color: rgba(255,255,255,.9);
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .icon { font-size: 1.3rem; }

  label { display: block; font-size: .82rem; color: rgba(255,255,255,.5); margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }

  input[type=text], textarea, select {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: .95rem;
    transition: border-color .3s, box-shadow .3s;
    outline: none; resize: none;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    border-color: rgba(245,200,66,.5);
    box-shadow: 0 0 0 3px rgba(245,200,66,.08);
  }
  select option { background: #2a1e3f; }
  textarea { min-height: 90px; }

  .field { margin-bottom: 16px; }

  /* ── THEMES ── */
  .theme-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .theme-option {
    border: 2px solid transparent; border-radius: 14px; padding: 14px 8px;
    cursor: pointer; text-align: center; transition: all .25s;
    font-size: .78rem; font-weight: 500; letter-spacing: .3px;
  }
  .theme-option:hover { transform: translateY(-3px); }
  .theme-option.selected { border-color: var(--gold); box-shadow: 0 0 16px rgba(245,200,66,.3); }
  .theme-option .t-icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }

  .theme-balloons { background: linear-gradient(135deg,#ff6b9d,#ffa726); }
  .theme-confetti { background: linear-gradient(135deg,#7c3aed,#ec4899); }
  .theme-golden   { background: linear-gradient(135deg,#b8860b,#ffd700); color:#1a1225; }
  .theme-ocean    { background: linear-gradient(135deg,#0ea5e9,#14b8a6); }
  .theme-rose     { background: linear-gradient(135deg,#be123c,#fb7185); }
  .theme-forest   { background: linear-gradient(135deg,#166534,#4ade80); }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    grid-column: 1 / -1;
  }
  #preview-box {
    border-radius: 20px; min-height: 380px; position: relative;
    overflow: hidden; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 48px 36px; cursor: default;
    transition: all .5s ease;
  }

  .preview-placeholder {
    color: rgba(255,255,255,.3); font-size: 1.1rem;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .preview-placeholder span { font-size: 3rem; }

  /* ── CARD ANIMATIONS ── */
  .card-particles { position: absolute; inset: 0; pointer-events: none; }
  .particle {
    position: absolute; border-radius: 50%;
    animation: floatUp var(--dur, 4s) var(--del, 0s) ease-in-out infinite;
  }
  @keyframes floatUp {
    0%   { opacity:0; transform: translateY(100%) scale(0); }
    20%  { opacity:1; }
    80%  { opacity:.8; }
    100% { opacity:0; transform: translateY(-120%) scale(1.2) rotate(360deg); }
  }

  .card-name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    line-height: 1.2;
    text-shadow: 0 2px 20px rgba(0,0,0,.4);
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }

  .card-type {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    font-style: italic; opacity: .9;
    margin-bottom: 12px;
    animation: popIn .6s .15s cubic-bezier(.34,1.56,.64,1) both;
  }

  .card-message {
    font-size: clamp(.9rem, 2vw, 1.1rem);
    line-height: 1.7; max-width: 480px;
    opacity: .9; margin-top: 16px;
    animation: popIn .6s .3s cubic-bezier(.34,1.56,.64,1) both;
  }

  .card-from {
    margin-top: 20px; font-size: .9rem; opacity: .7;
    font-style: italic;
    animation: popIn .6s .45s cubic-bezier(.34,1.56,.64,1) both;
  }

  /* ── FLOATING EMOJI ── */
  .float-emoji {
    position: absolute; font-size: 1.8rem; user-select: none;
    animation: floatEmoji var(--d,6s) var(--dl,0s) ease-in-out infinite alternate;
    opacity: .6;
  }
  @keyframes floatEmoji {
    0%   { transform: translate(0,0) rotate(-10deg); }
    100% { transform: translate(var(--tx,10px), var(--ty,-20px)) rotate(10deg); }
  }

  /* ── HEARTS for anniversary ── */
  .heart-burst { position: absolute; inset: 0; pointer-events: none; }
  .heart { position: absolute; animation: heartFloat var(--d,5s) var(--dl,0s) ease-in-out infinite; font-size: var(--s,1.5rem); }
  @keyframes heartFloat {
    0%   { opacity:0; transform: translateY(80px) scale(0); }
    30%  { opacity:1; }
    100% { opacity:0; transform: translateY(-100px) scale(1.3) rotate(var(--r,15deg)); }
  }

  /* RIPPLE on card */
  .ripple-ring {
    position: absolute; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.3);
    animation: rippleOut 3s ease-out infinite;
  }
  @keyframes rippleOut {
    0%   { width:60px;height:60px;opacity:.8;top:50%;left:50%;transform:translate(-50%,-50%); }
    100% { width:500px;height:500px;opacity:0;top:50%;left:50%;transform:translate(-50%,-50%); }
  }

  /* ── GENERATE BTN ── */
  .gen-btn {
    width: 100%; padding: 16px; border: none; border-radius: 16px;
    background: linear-gradient(135deg, var(--rose), var(--lavender));
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem; font-weight: 600; cursor: pointer;
    letter-spacing: .5px; margin-top: 8px;
    box-shadow: 0 8px 28px rgba(232,71,106,.35);
    transition: all .3s; position: relative; overflow: hidden;
  }
  .gen-btn::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
    opacity:0; transition:.3s;
  }
  .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(232,71,106,.45); }
  .gen-btn:hover::before { opacity:1; }
  .gen-btn:active { transform: translateY(0); }

  /* ── SHARE ROW ── */
  .share-row {
    display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;
  }
  .share-btn {
    flex: 1; min-width: 120px; padding: 13px 18px;
    border-radius: 12px; border: 1.5px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.06); color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500;
    cursor: pointer; backdrop-filter: blur(8px); transition: all .25s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .share-btn:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.3); transform: translateY(-2px); }
  .share-btn.copy { border-color: rgba(245,200,66,.3); }
  .share-btn.copy:hover { background: rgba(245,200,66,.1); }

  /* ── SHARE LINK BOX ── */
  .link-box {
    display: flex; gap: 10px; align-items: center;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
    border-radius: 14px; padding: 12px 16px; margin-top: 12px;
  }
  .link-box input {
    flex:1; background: none; border: none; color: rgba(255,255,255,.7);
    font-size: .88rem; outline: none; font-family: monospace;
  }
  .link-box button {
    border: none; background: var(--gold); color: var(--dark);
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: .85rem; transition: .2s;
    white-space: nowrap;
  }
  .link-box button:hover { filter: brightness(1.1); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(245,200,66,.95); color: var(--dark);
    padding: 12px 28px; border-radius: 50px;
    font-weight: 600; font-size: .95rem; z-index: 999;
    transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .4s;
    opacity: 0; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── FULL CARD VIEW (shareable page) ── */
  #card-view {
    display: none; position: fixed; inset: 0;
    z-index: 100; align-items: center; justify-content: center;
    flex-direction: column; padding: 20px;
  }
  #card-view.active { display: flex; }

  .card-backdrop {
    position: fixed; inset: 0;
    animation: bgPulse 4s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0%   { filter: brightness(1); }
    100% { filter: brightness(1.08); }
  }

  .full-card {
    position: relative; z-index: 2;
    max-width: 560px; width: 100%;
    border-radius: 28px; padding: 56px 44px;
    text-align: center; overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,.5);
    animation: cardReveal 1s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardReveal {
    0%   { opacity:0; transform: scale(.6) rotate(-5deg); }
    60%  { transform: scale(1.03) rotate(1deg); }
    100% { opacity:1; transform: scale(1) rotate(0); }
  }

  .close-btn {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
    color: #fff; font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px); transition: .2s;
  }
  .close-btn:hover { background: rgba(255,255,255,.3); }

  .make-own {
    margin-top: 28px; position: relative; z-index: 2;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
    color: #fff; padding: 14px 32px; border-radius: 50px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    cursor: pointer; backdrop-filter: blur(8px); transition: .3s;
    text-decoration: none; display: inline-block;
  }
  .make-own:hover { background: rgba(255,255,255,.25); transform: translateY(-2px); }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 200;
    display: none;
  }
  #confetti-canvas.active { display: block; }
</style>
</head>
<body>

<div id="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<canvas id="confetti-canvas"></canvas>

<!-- FULL CARD VIEW (shareable) -->
<div id="card-view">
  <button class="close-btn" onclick="closeCardView()">✕</button>
  <div class="card-backdrop" id="card-backdrop"></div>
  <div class="full-card" id="full-card">
    <!-- filled by JS -->
  </div>
  <a href="#" class="make-own" onclick="closeCardView();return false;">✨ Create Your Own Wish</a>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo">WishCraft ✨</div>
    <div class="tagline">Create & Share Magical Celebration Cards</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="setType('birthday',this)">🎂 Birthday</button>
    <button class="tab-btn" onclick="setType('anniversary',this)">💍 Anniversary</button>
  </div>

  <div class="builder">
    <div class="builder-grid">

      <!-- LEFT: Form -->
      <div class="glass-card">
        <div class="section-title"><span class="icon">🎨</span> Personalize</div>

        <div class="field">
          <label>Recipient's Name</label>
          <input type="text" id="recip-name" placeholder="e.g. Priya" oninput="livePreview()">
        </div>
        <div class="field">
          <label>From (your name)</label>
          <input type="text" id="from-name" placeholder="e.g. Rahul" oninput="livePreview()">
        </div>
        <div class="field">
          <label>Personal Message</label>
          <textarea id="message" placeholder="Write your heartfelt message here..." oninput="livePreview()"></textarea>
        </div>

        <div class="section-title" style="margin-top:8px"><span class="icon">🌈</span> Choose Theme</div>
        <div class="theme-grid" id="theme-grid">
          <div class="theme-option theme-balloons selected" onclick="setTheme('balloons',this)" data-theme="balloons">
            <span class="t-icon">🎈</span>Balloons
          </div>
          <div class="theme-option theme-confetti" onclick="setTheme('confetti',this)" data-theme="confetti">
            <span class="t-icon">🎉</span>Confetti
          </div>
          <div class="theme-option theme-golden" onclick="setTheme('golden',this)" data-theme="golden">
            <span class="t-icon">✨</span>Golden
          </div>
          <div class="theme-option theme-ocean" onclick="setTheme('ocean',this)" data-theme="ocean">
            <span class="t-icon">🌊</span>Ocean
          </div>
          <div class="theme-option theme-rose" onclick="setTheme('rose',this)" data-theme="rose">
            <span class="t-icon">🌹</span>Rose
          </div>
          <div class="theme-option theme-forest" onclick="setTheme('forest',this)" data-theme="forest">
            <span class="t-icon">🌿</span>Forest
          </div>
        </div>
      </div>

      <!-- RIGHT: Live Preview -->
      <div class="glass-card">
        <div class="section-title"><span class="icon">👁</span> Live Preview</div>
        <div id="preview-box">
          <div class="preview-placeholder">
            <span>🎁</span>
            <p>Fill in the details to preview your card</p>
          </div>
        </div>
      </div>

      <!-- FULL WIDTH: Generate & Share -->
      <div class="glass-card preview-panel">
        <div class="section-title"><span class="icon">🚀</span> Generate & Share</div>
        <button class="gen-btn" onclick="generateCard()">✨ Create My Card & Get Share Link</button>
        <div id="share-section" style="display:none">
          <div class="link-box">
            <input type="text" id="share-link" readonly>
            <button onclick="copyLink()">Copy Link</button>
          </div>
          <div class="share-row">
            <button class="share-btn" onclick="openCard()">🎴 Open Card</button>
            <button class="share-btn copy" onclick="copyLink()">📋 Copy Link</button>
            <button class="share-btn" onclick="shareWhatsApp()">📱 WhatsApp</button>
            <button class="share-btn" onclick="shareEmail()">📧 Email</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast">✓ Copied to clipboard!</div>

<script>
// ── STARFIELD ──
(function(){
  const c = document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+.5;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --o:${.3+Math.random()*.7};
      animation-delay:${Math.random()*5}s;
    `;
    c.appendChild(s);
  }
})();

// ── STATE ──
let currentType = 'birthday';
let currentTheme = 'balloons';

const themes = {
  balloons: { gradient:'linear-gradient(135deg,#ff6b9d,#ffa726)', emoji:['🎈','🎁','🎂','🎊','⭐','🌟'], color:'#fff' },
  confetti: { gradient:'linear-gradient(135deg,#7c3aed,#ec4899)', emoji:['🎉','✨','🎊','💫','🌈','⭐'], color:'#fff' },
  golden:   { gradient:'linear-gradient(135deg,#b8860b,#ffd700)', emoji:['✨','👑','🌟','💛','🎖','🏆'], color:'#1a1225' },
  ocean:    { gradient:'linear-gradient(135deg,#0ea5e9,#14b8a6)', emoji:['🌊','🐬','💎','🐠','⭐','🌺'], color:'#fff' },
  rose:     { gradient:'linear-gradient(135deg,#be123c,#fb7185)', emoji:['🌹','💕','💝','🌸','✨','💞'], color:'#fff' },
  forest:   { gradient:'linear-gradient(135deg,#166534,#4ade80)', emoji:['🌿','🍃','🦋','🌸','⭐','🌺'], color:'#fff' },
};

const birthdayMessages = [
  'May this special day bring you endless joy and wonderful memories!',
  'Wishing you a day full of sunshine, laughter, and all the things you love most.',
  'Another year of amazing adventures awaits you!',
];
const anniversaryMessages = [
  'Your love story is one of the most beautiful ever written. Here\'s to forever!',
  'Two hearts, one beautiful journey. Celebrating your love today and always.',
  'May your love continue to grow stronger with every passing year.',
];

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  livePreview();
}

function setTheme(theme, el) {
  currentTheme = theme;
  document.querySelectorAll('.theme-option').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  livePreview();
}

function livePreview() {
  const name = document.getElementById('recip-name').value.trim();
  const from = document.getElementById('from-name').value.trim();
  const msg  = document.getElementById('message').value.trim();
  const box  = document.getElementById('preview-box');
  const th   = themes[currentTheme];

  if (!name && !msg) {
    box.style.background = 'rgba(255,255,255,.04)';
    box.innerHTML = `<div class="preview-placeholder"><span>🎁</span><p>Fill in the details to preview your card</p></div>`;
    return;
  }

  const typeLabel = currentType === 'birthday' ? '🎂 Happy Birthday' : '💍 Happy Anniversary';
  const defMsg = currentType === 'birthday' ? birthdayMessages[0] : anniversaryMessages[0];

  box.style.background = th.gradient;
  box.style.color = th.color;

  box.innerHTML = buildCardHTML(name, from, msg || defMsg, typeLabel, th, true);
  spawnPreviewParticles(box, th);
}

function buildCardHTML(name, from, msg, typeLabel, th, mini) {
  const emojis = th.emoji;
  const floaters = emojis.map((e,i) => {
    const top  = 5  + Math.random()*80;
    const left = 5  + Math.random()*85;
    const dur  = 4  + Math.random()*5;
    const del  = i  * .8;
    const tx   = (Math.random()-0.5)*30;
    const ty   = -(10 + Math.random()*30);
    return `<span class="float-emoji" style="top:${top}%;left:${left}%;--d:${dur}s;--dl:${del}s;--tx:${tx}px;--ty:${ty}px">${e}</span>`;
  }).join('');

  const ripple = mini ? '' : `<div class="ripple-ring" style="animation-delay:0s"></div><div class="ripple-ring" style="animation-delay:1s"></div><div class="ripple-ring" style="animation-delay:2s"></div>`;

  return `
    ${ripple}
    <div class="card-particles" id="cp"></div>
    ${floaters}
    <div class="card-type" style="color:${th.color}">${typeLabel}</div>
    ${name ? `<div class="card-name" style="color:${th.color}">Dear ${name} 🎉</div>` : ''}
    <div class="card-message" style="color:${th.color};opacity:.95">${msg}</div>
    ${from ? `<div class="card-from" style="color:${th.color}">— With love, ${from} 💛</div>` : ''}
  `;
}

function spawnPreviewParticles(box, th) {
  const cp = box.querySelector('#cp');
  if (!cp) return;
  cp.innerHTML = '';
  const colors = ['#fff', th.color === '#fff' ? '#ffd700' : '#fff', '#ffb3c1', '#b5ead7'];
  for (let i=0;i<18;i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random()*8;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;bottom:0;
      --dur:${3+Math.random()*4}s;
      --del:${Math.random()*3}s;
      opacity:.7;
    `;
    cp.appendChild(p);
  }
}

// ── GENERATE CARD ──
function generateCard() {
  const name = document.getElementById('recip-name').value.trim();
  const from = document.getElementById('from-name').value.trim();
  const msg  = document.getElementById('message').value.trim();

  if (!name) { showToast('Please enter the recipient\'s name! 🎁'); return; }

  const th = themes[currentTheme];
  const typeLabel = currentType === 'birthday' ? '🎂 Happy Birthday' : '💍 Happy Anniversary';
  const defMsg = currentType === 'birthday'
    ? `May every wish of yours come true today and always! You deserve all the happiness in the world. ${birthdayMessages[Math.floor(Math.random()*birthdayMessages.length)]}`
    : `${anniversaryMessages[Math.floor(Math.random()*anniversaryMessages.length)]} Congratulations on your beautiful journey together!`;

  const data = {
    name, from, msg: msg || defMsg,
    type: currentType, theme: currentTheme, typeLabel
  };

  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const link = window.location.href.split('?')[0] + '?card=' + encoded;

  document.getElementById('share-link').value = link;
  document.getElementById('share-section').style.display = 'block';

  livePreview();
  openCard(data);
}

function openCard(data) {
  if (!data) {
    const link = document.getElementById('share-link').value;
    const encoded = new URL(link).searchParams.get('card');
    try { data = JSON.parse(decodeURIComponent(escape(atob(encoded)))); } catch(e){ return; }
  }
  showFullCard(data);
}

function showFullCard(data) {
  const th = themes[data.theme] || themes.balloons;
  const backdrop = document.getElementById('card-backdrop');
  backdrop.style.background = th.gradient;

  const fc = document.getElementById('full-card');
  fc.style.background = th.gradient;
  fc.style.color = th.color;

  fc.innerHTML = buildCardHTML(data.name, data.from, data.msg, data.typeLabel, th, false);

  // Add hearts for anniversary
  if (data.type === 'anniversary') {
    const hb = document.createElement('div');
    hb.className = 'heart-burst';
    const heartEmojis = ['💕','💖','💗','💝','❤️','🥰'];
    for (let i=0;i<14;i++) {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
      h.style.cssText = `
        left:${Math.random()*100}%;bottom:0;
        --d:${3+Math.random()*4}s;--dl:${Math.random()*3}s;
        --r:${(Math.random()-0.5)*40}deg;--s:${1+Math.random()}rem;
      `;
      hb.appendChild(h);
    }
    fc.prepend(hb);
  }

  spawnPreviewParticles(fc, th);

  const view = document.getElementById('card-view');
  view.classList.add('active');

  // Confetti burst
  setTimeout(() => launchConfetti(), 300);
}

function closeCardView() {
  document.getElementById('card-view').classList.remove('active');
  stopConfetti();
}

// ── CONFETTI ──
let confettiAnim, confettiRunning = false;
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.classList.add('active');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const pieces = [];
  const colors = ['#f5c842','#e8476a','#9b72cf','#2ec4b6','#ff6b9d','#fff','#4ade80'];

  for (let i=0;i<150;i++) {
    pieces.push({
      x: Math.random()*canvas.width,
      y: -10 - Math.random()*200,
      w: 8 + Math.random()*10, h: 5 + Math.random()*8,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*360, rotV: (Math.random()-0.5)*6,
      vx: (Math.random()-0.5)*4, vy: 2+Math.random()*4,
    });
  }

  confettiRunning = true;
  function draw() {
    if (!confettiRunning) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
      if (p.y > canvas.height+20) { p.y = -20; p.x = Math.random()*canvas.width; }
    });
    confettiAnim = requestAnimationFrame(draw);
  }
  draw();

  // Stop after 4s
  setTimeout(stopConfetti, 4500);
}
function stopConfetti() {
  confettiRunning = false;
  cancelAnimationFrame(confettiAnim);
  const canvas = document.getElementById('confetti-canvas');
  canvas.classList.remove('active');
}

// ── SHARE ──
function copyLink() {
  const link = document.getElementById('share-link').value;
  if (!link) { showToast('Generate a card first! 🎁'); return; }
  navigator.clipboard.writeText(link).then(() => showToast('🔗 Link copied! Share it with love ✨'));
}

function shareWhatsApp() {
  const link = document.getElementById('share-link').value;
  if (!link) { showToast('Generate a card first!'); return; }
  const name = document.getElementById('recip-name').value;
  const text = `🎉 I made a special wish for ${name}! Open this to see it 💛\n\n${link}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function shareEmail() {
  const link = document.getElementById('share-link').value;
  if (!link) { showToast('Generate a card first!'); return; }
  const name = document.getElementById('recip-name').value;
  const subject = currentType === 'birthday' ? `🎂 Happy Birthday ${name}!` : `💍 Happy Anniversary ${name}!`;
  const body = `I created a special animated card just for you!\n\nOpen this link to see your surprise:\n${link}\n\nMade with WishCraft ✨`;
  window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── CHECK FOR SHARED CARD ON LOAD ──
(function() {
  const params = new URLSearchParams(window.location.search);
  const card = params.get('card');
  if (card) {
    try {
      const data = JSON.parse(decodeURIComponent(escape(atob(card))));
      // Wait for DOM then show card
      setTimeout(() => {
        // Pre-fill the form too
        if (data.name) document.getElementById('recip-name').value = data.name;
        if (data.from) document.getElementById('from-name').value = data.from;
        if (data.msg)  document.getElementById('message').value = data.msg;
        currentType  = data.type  || 'birthday';
        currentTheme = data.theme || 'balloons';

        // Mark theme selected
        document.querySelectorAll('.theme-option').forEach(t => {
          t.classList.toggle('selected', t.dataset.theme === currentTheme);
        });
        // Mark tab selected
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.toggle('active', b.textContent.toLowerCase().includes(currentType.substring(0,5)));
        });

        livePreview();
        showFullCard(data);
      }, 400);
    } catch(e) {}
  }
})();

// Resize confetti canvas
window.addEventListener('resize', () => {
  const c = document.getElementById('confetti-canvas');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
});
</script>
